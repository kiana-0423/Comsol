# Global simulation controls (COMSOL 6.4 / Linux and macOS)
comsol.version=6.4
c.rates=0.1,1.0
mode=charge
discharge.initialization=continue_charge
mesh.level=normal
mesh.max.size=0.0833[um]
mesh.min.size=0.0125[um]
mesh.growth.rate=1.25
mesh.convergence.tolerance=0.03
# Solver-qualified baseline. Tighten to 1e-3 and 1e-4 in the required
# time-step/tolerance convergence study; 1e-4 makes the provisional 3D model
# advance only a few physical seconds per wall-clock minute.
solver.relative.tolerance=1e-2
solver.output.points=0,0.2,0.4,0.5,0.6,0.8,1.0
solver.max.step.fraction=0.02
smoke.duration=2[s]
smoke.mesh.size=0.5[um]
output.root=output
figures.concentration.min=0.2
figures.concentration.max=1.0
# Shared stress scale for paired NFM/NFMZC plots. Kang et al. (2026), Fig. 6,
# uses 10--1000 MPa and reports an NFM peak of 597 MPa; 0--1000 MPa therefore
# preserves a common scale without clipping the literature benchmark.
figures.stress.min=0[MPa]
figures.stress.max=1000[MPa]
export.progress.points=0.2,0.5,0.8,1.0
validation.initial.stress.tolerance=1e3[Pa]
