# NFMZC uniform-equivalent stage-1 material parameters.
material.name=NFMZC
material.formula=NaNi0.185Zn0.015Fe0.4Mn0.37Co0.03O2
particle.radius=2.5[um]
particle.density=4550[kg/m^3]
capacity=175[mAh/g]
molar.mass=111.274[g/mol]
csmax=rho_p/M_formula
# x decreases from 1.0 to 0.2 on charge: 0.8 mol Na is removed; it is NOT 0.8 remaining.
initial.x=1.0
final.x.charge=0.2
# GITT averages from the supplied requirement: extraction/charge and insertion/discharge.
diffusion.charge=1.84e-13[m^2/s]
diffusion.discharge=2.76e-13[m^2/s]
young.modulus=150[GPa]
poisson.ratio=0.25
# Provisional sensitivity assumption: lower chemical expansion than NFM.
chemical.expansion.beta=0.008
parameter.status=provisional
parameter.source=supplied GITT table; mechanics and strain remain provisional
parameter.uncertainty=0.25
parameter.metadata.csv=data/parameter_metadata_nfmzc.csv
ocv.csv=data/ocv_nfmzc_template.csv
experimental.curve.csv=data/experimental_charge_nfmzc_template.csv
exchange.current.density=1[A/m^2]
diffusion.mode=constant
diffusion.charge.csv=data/ds_nfmzc_template.csv
diffusion.discharge.csv=data/ds_nfmzc_discharge_template.csv
strain.mode=linear
strain.csv=data/strain_nfmzc_template.csv
phase.transition.enabled=false
phase.x.start=0.32
phase.x.end=0.48
phase.extra.strain=0.002
phase.smoothing.width=0.04
gradient.enabled=false
gradient.exponent=2
gradient.diffusion.core=1.84e-13[m^2/s]
gradient.diffusion.surface=1.84e-13[m^2/s]
gradient.beta.core=0.008
gradient.beta.surface=0.008
