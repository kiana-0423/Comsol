# NFM material parameters. All numerical values are provisional unless replaced by cited data.
material.name=NFM
material.formula=NaNi0.2Fe0.4Mn0.4O2
particle.radius=2.5[um]
# Legacy values directly adopted from parameters.docx; provisional pending
# material-specific density and mechanical measurements.
particle.density=4550[kg/m^3]
capacity=175[mAh/g]
molar.mass=111.040[g/mol]
csmax=rho_p/M_formula
# x decreases from 1.0 to 0.2 on charge: 0.8 mol Na is removed; it is NOT 0.8 remaining.
initial.x=1.0
final.x.charge=0.2
# GITT averages from the supplied requirement: extraction/charge and insertion/discharge.
diffusion.charge=1.08e-13[m^2/s]
diffusion.discharge=1.40e-13[m^2/s]
young.modulus=150[GPa]
young.modulus.sensitivity.gpa=100,150,200
# Isotropic polycrystalline baseline from the user-supplied O3 layered-oxide
# modeling recommendation; exact-composition elastic tensor remains unavailable.
poisson.ratio=0.30
poisson.sensitivity.values=0.25,0.30,0.35
chemical.expansion.beta=0.012
chemical.expansion.beta.sensitivity.values=0.008,0.012,0.020
parameter.status=provisional
parameter.source=supplied GITT table; user-supplied trend-model baseline for mechanics strain and kinetics; Kang et al. 2026 validation bounds; all non-GITT values remain provisional
parameter.uncertainty=0.25
parameter.metadata.csv=data/parameter_metadata_nfm.csv
ocv.csv=data/ocv_nfm_template.csv
experimental.curve.csv=data/experimental_charge_nfm_template.csv
exchange.current.density=5[A/m^2]
exchange.current.density.sensitivity.a_m2=1,5,20
# sensitivity parameter: constant or interpolation
diffusion.mode=constant
diffusion.charge.csv=data/ds_nfm_template.csv
diffusion.discharge.csv=data/ds_nfm_discharge_template.csv
# sensitivity parameter: linear, interpolation, phase_transition
strain.mode=linear
strain.csv=data/strain_nfm_template.csv
phase.transition.enabled=false
# Literature landmarks for later calibration: O3->P3 begins near 3.3 V and
# the high-voltage O3-prime region appears near 4.25--4.30 V. The present
# x-based surrogate remains disabled until voltage/SOC-resolved XRD is supplied.
phase.x.high=0.70
phase.x.low=0.35
phase.extra.strain=0.006
phase.smoothing.width=0.03
gradient.enabled=false
gradient.exponent=2
gradient.diffusion.core=1.08e-13[m^2/s]
gradient.diffusion.surface=1.08e-13[m^2/s]
gradient.beta.core=0.012
gradient.beta.surface=0.012
