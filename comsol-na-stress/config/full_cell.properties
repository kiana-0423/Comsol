# Three-dimensional heterogeneous representative full-cell unit. Geometry values are
# provisional reconstructions of the supplied report and must be replaced by measured values.
geometry.classification=representative-microstructure
geometry.anode.length=9[um]
geometry.separator.length=3[um]
geometry.cathode.length=6[um]
geometry.width=9[um]
geometry.height=9[um]
particle.negative.large.radius=2.3[um]
particle.negative.small.radius=1.8[um]

# cl0 and conductivity come from parameters.docx; Dl and tplus use the
# user-supplied trend-model baseline. All remain provisional until the actual
# electrolyte recipe, transport definition and test temperature are confirmed.
electrolyte.initial.concentration=1[M]
# 1 M value digitized from the legacy sigmal(c) curve (8.82 mS/cm).
electrolyte.conductivity=0.882[S/m]
electrolyte.diffusivity=1.5e-10[m^2/s]
electrolyte.transference.number=0.40
kinetics.alpha=0.5

# csmax and initial x come from parameters.docx; mechanics/expansion use the
# user-supplied trend baseline. All remain provisional.
negative.csmax=14.54[kmol/m^3]
negative.initial.x=0.007
# Representative fallback for the active legacy D_HC(x) interpolation below.
negative.diffusivity=1e-15[m^2/s]
negative.young.modulus=15[GPa]
negative.poisson.ratio=0.25
negative.chemical.expansion.beta=0.025
negative.exchange.current.density.baseline.a_m2=3
negative.exchange.current.density.sensitivity.a_m2=0.5,3,15

# Binder conductivity comes from parameters.docx; binder/separator mechanics
# use the user-supplied porous-equivalent trend baseline.
binder.conductivity=10[S/m]
binder.young.modulus=0.3[GPa]
binder.poisson.ratio=0.32
separator.young.modulus=0.35[GPa]
separator.poisson.ratio=0.30
porosity.anode=0.35
porosity.cathode=0.30
porosity.separator=0.45
tortuosity.anode=1.69
tortuosity.cathode=1.83
tortuosity.separator=1.49

negative.ocv.csv=data/ocv_hard_carbon_template.csv
negative.kinetics.csv=data/k_hard_carbon_template.csv
negative.diffusivity.csv=data/ds_hard_carbon_parameters_docx.csv
electrolyte.conductivity.csv=data/electrolyte_conductivity_parameters_docx.csv

snapshots.charge.voltages=2.7,3.3,3.7,4.0,4.3
snapshots.discharge.voltages=4.3,3.5,3.3,3.0,2.6
snapshots.soc.fractions=0,0.25,0.5,0.75,1.0
cutoff.charge.voltage=4.3
cutoff.discharge.voltage=2.0
mesh.max.size=0.4[um]
mesh.min.size=0.05[um]
validation.voltage.rmse.limit=0.05
validation.voltage.rmse.provisional.limit=0.10
validation.capacity.error.limit=0.05
validation.mass.balance.error.limit=0.01
convergence.average.concentration.limit=0.01
convergence.concentration.delta.limit=0.02
convergence.average.stress.limit=0.03
convergence.stress.p95.limit=0.05
parameter.status=provisional
parameter.source=parameters.docx legacy COMSOL model plus user-supplied provisional trend baseline and explicit placeholders documented in data/README.md
parameter.uncertainty=0.30
parameter.metadata.csv=data/parameter_metadata_full_cell.csv
